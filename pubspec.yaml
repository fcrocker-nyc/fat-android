name: fat_app
description: "Farm Animal Transparency — meat label scanner"
publish_to: 'none'

version: 1.10.7+28
environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # OCR — Google ML Kit (replaces iOS VisionKit)
  google_mlkit_text_recognition: ^0.13.1
  google_mlkit_image_labeling: ^0.12.1

  # Camera
  camera: ^0.11.1

  # Image picker (gallery / fallback)
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Local persistence
  shared_preferences: ^2.5.3

  # HTTP for processor/brand lookups
  http: ^1.2.2

  # URL launcher (links to FAT website)
  url_launcher: ^6.3.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# App launcher icon — generated from the iOS FAT icon so Android matches iPhone.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#223C28"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/brand_data.json
